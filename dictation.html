<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dictation — LinguaTaxi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--surface:#16162a;--border:rgba(255,255,255,.08);--text:#e0e0e0;--dim:rgba(255,255,255,.45);--accent:#4FC3F7}
html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text)}
body{display:flex;flex-direction:column}

.toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.toolbar .title{font-size:13px;font-weight:600;color:var(--accent);margin-right:auto;display:flex;align-items:center;gap:6px}
.toolbar .dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0}
.toolbar .dot.conn{background:#4CAF50;box-shadow:0 0 6px #4CAF50}
.toolbar .dot.live{background:#f44336;box-shadow:0 0 6px #f44336;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toolbar .status{font-size:11px;color:var(--dim);margin-right:8px}
.btn{padding:6px 14px;border:1px solid var(--border);border-radius:5px;background:rgba(255,255,255,.05);color:var(--dim);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;text-transform:uppercase;letter-spacing:.04em}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.btn-accent{border-color:var(--accent);color:var(--accent)}
.btn-accent:hover{background:rgba(79,195,247,.15)}
.btn-danger{border-color:#f44336;color:#f44336}
.btn-danger:hover{background:rgba(244,67,54,.15)}
.btn-go{background:#4CAF50;border-color:#4CAF50;color:#fff;font-size:12px;padding:7px 18px}
.btn-go:hover{background:#66BB6A;color:#fff}
.btn-go.active{background:#f44336;border-color:#f44336}
.btn-go.active:hover{background:#EF5350}
.wordcount{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}

.settings-row{display:flex;align-items:center;gap:8px;padding:6px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;font-size:11px}
.settings-row label{color:var(--dim);font-weight:600;white-space:nowrap}
.settings-row input[type="text"]{flex:1;padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-family:inherit;font-size:11px}
.settings-row input[type="text"]:focus{outline:none;border-color:var(--accent)}

.interim-bar{display:flex;align-items:center;gap:6px;padding:6px 16px;border-bottom:1px solid var(--border);background:rgba(79,195,247,.04);flex-shrink:0;min-height:0;overflow:hidden}
.interim-bar .interim-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);flex-shrink:0}
.interim-bar .interim-text{font-size:12px;color:rgba(255,255,255,.5);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.editor-wrap{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}
.editor{flex:1;width:100%;padding:24px 32px;border:none;outline:none;resize:none;background:transparent;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;line-height:1.8;max-width:900px;margin:0 auto;box-sizing:border-box}
.editor::placeholder{color:rgba(255,255,255,.25);font-style:italic}
.insert-hint{position:absolute;bottom:8px;right:16px;font-size:10px;color:var(--dim);pointer-events:none;transition:opacity .2s}
</style>
</head>
<body>

<div class="toolbar">
  <div class="title"><span class="dot" id="dot"></span> <span data-i18n="dictation.toolbar_title">Dictation</span></div>
  <button class="btn btn-go" id="goBtn" onclick="toggleTranscribing()" data-i18n="dictation.start_btn">Start</button>
  <span class="status" id="status" data-i18n="dictation.status_connecting">Connecting...</span>
  <span class="wordcount" id="wordcount" data-i18n="dictation.word_count" data-i18n-count="0">0 words</span>
  <button class="btn btn-accent" onclick="copyAll()" title="Copy all text to clipboard" data-i18n="dictation.copy_btn">Copy</button>
  <button class="btn btn-accent" onclick="saveFile()" title="Save as .txt file" data-i18n="dictation.save_btn">Save</button>
  <button class="btn btn-danger" onclick="clearAll()" title="Clear all text" data-i18n="dictation.clear_btn">Clear</button>
</div>

<div class="settings-row">
  <label data-i18n="dictation.save_to_label">Save to:</label>
  <input type="text" id="saveDir" placeholder="Loading..." spellcheck="false" onkeydown="if(event.key==='Enter')updateDir()" data-i18n="dictation.save_to_placeholder" data-i18n-ph>
  <button class="btn" onclick="updateDir()" style="padding:4px 10px;font-size:10px" data-i18n="dictation.set_btn">Set</button>
</div>

<div class="interim-bar" id="interimBar" style="display:none">
  <span class="interim-label" data-i18n="dictation.hearing_label">Hearing:</span>
  <span class="interim-text" id="interimText"></span>
</div>

<div class="editor-wrap">
  <textarea class="editor" id="editor" spellcheck="true"
    placeholder="Click Start then speak — text will appear here.&#10;&#10;You can click anywhere to position your cursor.&#10;New speech will be inserted at the cursor position.&#10;You can freely edit, select, and type in this area." data-i18n="dictation.editor_placeholder" data-i18n-ph></textarea>
  <div class="insert-hint" id="insertHint" style="opacity:0" data-i18n="dictation.insert_at_cursor">Insert at cursor</div>
</div>

<script>
let ws = null, recon = 0;
let interimText = '';
let transcribing = false;

let _i18n={}, _i18nEn={};
function t(key,vars){
    let s=_i18n[key]||_i18nEn[key]||key;
    if(vars)Object.entries(vars).forEach(([k,v])=>{s=s.replaceAll('{'+k+'}',v)});
    return s;
}
async function loadTranslations(lang){
    try{
        if(!Object.keys(_i18nEn).length){const r=await fetch('/api/locales/en');if(r.ok)_i18nEn=await r.json()}
        const r2=await fetch('/api/locales/'+lang.toLowerCase());
        if(r2.ok)_i18n=await r2.json();else _i18n={..._i18nEn};
    }catch(e){_i18n={..._i18nEn}}
    document.querySelectorAll('[data-i18n]').forEach(el=>{
        if(el.hasAttribute('data-i18n-ph')) el.placeholder=t(el.getAttribute('data-i18n'));
        else el.textContent=t(el.getAttribute('data-i18n'));
    });
    document.documentElement.lang=lang.toLowerCase();
    document.documentElement.dir=lang==='AR'?'rtl':'ltr';
}

const editor = document.getElementById('editor');
const interimBar = document.getElementById('interimBar');
const interimTextEl = document.getElementById('interimText');
const dot = document.getElementById('dot');
const statusEl = document.getElementById('status');
const wordcountEl = document.getElementById('wordcount');
const insertHint = document.getElementById('insertHint');

// Track whether cursor is at end (for insert-at-cursor hint)
function isCursorAtEnd() {
  return editor.selectionStart === editor.value.length &&
         editor.selectionEnd === editor.value.length;
}

function updateInsertHint() {
  if (editor.value.length > 0 && !isCursorAtEnd() &&
      document.activeElement === editor && transcribing) {
    insertHint.style.opacity = '1';
    insertHint.textContent = t('dictation.insert_at_cursor_position', {pos: editor.selectionStart});
  } else {
    insertHint.style.opacity = '0';
  }
}

editor.addEventListener('click', updateInsertHint);
editor.addEventListener('keyup', updateInsertHint);
editor.addEventListener('focus', updateInsertHint);
editor.addEventListener('blur', () => { insertHint.style.opacity = '0'; });

function insertTextAtCursor(text) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const val = editor.value;

  // Determine if we need a space before the inserted text
  let prefix = '';
  if (start > 0 && val.length > 0) {
    const before = val[start - 1];
    if (before !== '\n' && before !== ' ' && before !== '\t') {
      prefix = ' ';
    }
  }

  const insert = prefix + text;
  // Use execCommand for undo support where available, fall back to direct manipulation
  editor.focus();
  editor.setSelectionRange(start, end);
  if (!document.execCommand('insertText', false, insert)) {
    // Fallback
    editor.value = val.slice(0, start) + insert + val.slice(end);
  }
  const newPos = start + insert.length;
  editor.setSelectionRange(newPos, newPos);
  editor.scrollTop = editor.scrollHeight;
  updateWordCount();
  updateInsertHint();
}

function appendText(text) {
  const val = editor.value;
  let prefix = '';
  if (val.length > 0 && !val.endsWith('\n') && !val.endsWith(' ')) {
    prefix = ' ';
  }
  editor.value += prefix + text;
  editor.scrollTop = editor.scrollHeight;
  // Place cursor at end
  const len = editor.value.length;
  editor.setSelectionRange(len, len);
  updateWordCount();
}

function updateWordCount() {
  const text = editor.value.trim();
  const count = text ? text.split(/\s+/).length : 0;
  if (count === 1) {
    wordcountEl.textContent = t('dictation.word_count_singular', {count: count});
  } else {
    wordcountEl.textContent = t('dictation.word_count', {count: count});
  }
}

// Listen for manual edits too
editor.addEventListener('input', updateWordCount);

function copyAll() {
  const text = editor.value.trim();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    statusEl.textContent = t('dictation.status_copied');
    setTimeout(() => { statusEl.textContent = transcribing ? t('dictation.status_listening') : t('dictation.status_stopped'); }, 1500);
  });
}

function saveFile() {
  const text = editor.value.trim();
  if (!text) return;
  const fd = new FormData();
  fd.append('text', text);
  fetch('/api/dictation-save', { method: 'POST', body: fd })
    .then(r => r.json())
    .then(r => {
      if (r.path) {
        statusEl.textContent = t('dictation.status_saved');
        setTimeout(() => { statusEl.textContent = transcribing ? t('dictation.status_listening') : t('dictation.status_stopped'); }, 2000);
      } else {
        statusEl.textContent = t('dictation.status_save_error', {error: r.error || 'unknown'});
      }
    })
    .catch(() => { statusEl.textContent = t('dictation.status_save_failed'); });
}

function loadDirConfig() {
  fetch('/api/dictation-config').then(r => r.json()).then(c => {
    document.getElementById('saveDir').value = c.dictation_dir || '';
  });
}

function updateDir() {
  const dir = document.getElementById('saveDir').value.trim();
  if (!dir) return;
  const fd = new FormData();
  fd.append('dictation_dir', dir);
  fetch('/api/dictation-config', { method: 'POST', body: fd })
    .then(r => r.json())
    .then(r => {
      if (r.error) {
        statusEl.textContent = t('dictation.status_invalid_path', {error: r.error});
      } else {
        document.getElementById('saveDir').value = r.dictation_dir;
        statusEl.textContent = t('dictation.status_directory_updated');
        setTimeout(() => { statusEl.textContent = transcribing ? t('dictation.status_listening') : t('dictation.status_stopped'); }, 1500);
      }
    });
}

function clearAll() {
  editor.value = '';
  interimText = '';
  interimBar.style.display = 'none';
  updateWordCount();
  updateInsertHint();
}

function toggleTranscribing() {
  transcribing = !transcribing;
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'set_dictation_active', active: transcribing }));
  }
  updateGoBtn();
  updateInsertHint();
}

function updateGoBtn() {
  const btn = document.getElementById('goBtn');
  if (transcribing) {
    btn.textContent = t('dictation.stop_btn');
    btn.classList.add('active');
  } else {
    btn.textContent = t('dictation.start_btn');
    btn.classList.remove('active');
  }
}

function handleMsg(msg) {
  switch (msg.type) {
    case 'status':
      if (msg.dictation_active !== undefined) {
        transcribing = msg.dictation_active;
        updateGoBtn();
        if (!transcribing) { statusEl.textContent = t('dictation.status_stopped'); break; }
      }
      if (msg.state === 'speech') {
        dot.className = 'dot live';
        statusEl.textContent = t('dictation.status_listening');
      } else if (msg.state === 'silence') {
        dot.className = 'dot conn';
        statusEl.textContent = transcribing ? t('dictation.status_ready') : t('dictation.status_stopped');
      }
      break;
    case 'interim':
      interimText = msg.text || '';
      if (interimText) {
        interimTextEl.textContent = interimText;
        interimBar.style.display = 'flex';
      } else {
        interimBar.style.display = 'none';
      }
      break;
    case 'final':
      if (msg.text) {
        // Insert at cursor if user has positioned it mid-text, else append
        if (document.activeElement === editor && !isCursorAtEnd()) {
          insertTextAtCursor(msg.text);
        } else {
          appendText(msg.text);
        }
      }
      interimText = '';
      interimBar.style.display = 'none';
      break;
    case 'dictation_active':
      transcribing = msg.active;
      updateGoBtn();
      if (!msg.active) {
        statusEl.textContent = t('dictation.status_stopped');
        dot.className = 'dot';
        interimBar.style.display = 'none';
      } else {
        statusEl.textContent = t('dictation.status_listening');
        dot.className = 'dot conn';
      }
      updateInsertHint();
      break;
    case 'config_update':
      if (msg.ui_language) loadTranslations(msg.ui_language);
      break;
    case 'captioning_paused':
    case 'clear_captions':
      break; // Ignore — dictation is independent
    case 'interim_translation':
    case 'final_translation':
      break; // Ignore — dictation is independent
  }
}

function connect() {
  ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
  ws.onopen = () => {
    recon = 0;
    dot.className = 'dot conn';
    statusEl.textContent = t('dictation.status_ready');
  };
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose = () => {
    dot.className = 'dot';
    statusEl.textContent = t('dictation.status_reconnecting');
    if (recon < 50) setTimeout(connect, Math.min(1000 * Math.pow(1.5, recon++), 10000));
  };
  ws.onerror = () => {};
}

// Load initial config and translations
fetch('/api/dictation-config').then(r=>r.json()).then(c=>{
  document.getElementById('saveDir').value = c.dictation_dir || '';
});
fetch('/api/config').then(r=>r.json()).then(c=>{
  if(c.ui_language) loadTranslations(c.ui_language);
  connect();
}).catch(()=>connect());
</script>
</body>
</html>
